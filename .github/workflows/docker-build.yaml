name: Docker Build

"on":
  "workflow_dispatch":
  push:
    branches:
      - 'main'
    tags:
      - '*'
    paths:
      - 'src/**'
      - 'docker/**'

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: Build Docker Image
    permissions:
      security-events: read
      contents: read
      packages: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian GNU/Linux
            variant: debian
            suffix: -debian
            arch: linux/amd64,linux/arm64
          - name: Canonical Ubuntu
            variant: ubuntu
            suffix: -ubuntu
            arch: linux/amd64,linux/arm64
          - name: RedHat Enterprise Linux
            variant: rhel
            suffix: -rhel
            arch: linux/amd64
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
        with:
          cache-image: false
          platforms: ${{ matrix.arch }}
      - uses: docker/setup-buildx-action@v4
        with:
          cache-binary: false
      - name: Log into Github Container Registry (ghcr)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,enable=${{matrix.variant == 'debian'}}
            type=ref,event=branch,suffix=${{ matrix.suffix }}
            type=ref,event=tag,suffix=${{ matrix.suffix }}
            type=raw,value=latest,enable=${{startsWith(github.ref, 'refs/tags/') && matrix.variant != 'debian'}},suffix=${{ matrix.suffix }}
            type=raw,value=latest,enable=${{startsWith(github.ref, 'refs/tags/') && matrix.variant == 'debian'}}
      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          file: ./docker/Dockerfile${{ matrix.suffix }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.arch }}
